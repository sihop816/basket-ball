<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Basketball Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Enhanced Basketball Game</h1>
    <div id="game-container">
        <!-- Game canvas for rendering -->
        <canvas id="gameCanvas"></canvas>
        <div id="controls">
            <button id="shootBtn">Shoot</button>
            <button id="passBtn">Pass</button>
            <button id="dribbleBtn">Dribble</button>
        </div>
    </div>
    <div id="leaderboard">
        <h2>Leaderboard</h2>
        <ol id="leaderboardList">
            <!-- Dynamic leaderboard will be populated here -->
        </ol>
    </div>
    <div id="gameModes">
        <h2>Game Modes</h2>
        <button id="singlePlayer">Single Player</button>
        <button id="multiplayer">Multiplayer</button>
        <button id="timedChallenge">Timed Challenge</button>
    </div>
    <script src="game.js"></script>
</body>
</html>

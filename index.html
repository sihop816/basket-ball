<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Basketball Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #f8f8f8;\n            font-family: Arial, sans-serif;\n        }\n        #court {\n            width: 800px;\n            height: 400px;\n            background-color: #c2a966;\n            position: relative;\n            border: 5px solid #fff;\n            overflow: hidden;\n        }\n        .ball {\n            width: 20px;\n            height: 20px;\n            background-color: orange;\n            border-radius: 50%;\n            position: absolute;\n        }\n    </style>\n</head>\n<body>\n    <div id="court">\n        <div class="ball" id="ball"></div>\n    </div>\n    <script>\n        const ball = document.getElementById('ball');\n        let ballX = Math.random() * 780;\n        let ballY = Math.random() * 380;\n        ball.style.left = ballX + 'px';\n        ball.style.top = ballY + 'px';\n        document.addEventListener('keydown', function(event) {\n            switch(event.key) {\n                case 'ArrowUp':\n                    ballY -= 10;\n                    break;\n                case 'ArrowDown':\n                    ballY += 10;\n                    break;\n                case 'ArrowLeft':\n                    ballX -= 10;\n                    break;\n                case 'ArrowRight':\n                    ballX += 10;\n                    break;\n            }\n            ball.style.left = ballX + 'px';\n            ball.style.top = ballY + 'px';\n        });\n    </script>\n</body>\n</html>
